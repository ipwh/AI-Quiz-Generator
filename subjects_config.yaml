# =========================================================
# subjects_config.yaml
# AI 題目生成器 - 科目配置
# 包含：SUBJECT_TRAITS、SUBJECT_MISCONCEPTIONS、SUBJECT_DISTRACTOR_HINTS
# =========================================================

subjects:
  中國語文:
    traits: "篇章理解、語境推斷、主旨、作者態度、修辭與寫作意圖。題幹自然，避免『根據教材』字眼。"
    misconceptions:
      - "斷章取義"
      - "過度推論"
      - "把描述當立場"
      - "忽略語境"
      - "修辭作用誤判"
      - "轉折/因果混淆"
    distractor_hints:
      - "斷章取義（取片段偏離主旨）"
      - "過度推論（推到文中沒有）"
      - "把描述當立場（敘述誤當態度）"
      - "修辭作用誤判（手法對但作用錯）"
      - "轉折/因果混淆"

  英國語文:
    traits: "Reading comprehension, inference, tone/attitude, vocabulary in context, cohesion. Avoid meta phrasing."
    misconceptions:
      - "near-synonym trap"
      - "opposite tone"
      - "wrong referent"
      - "overgeneralization"
      - "negation trap"
    distractor_hints:
      - "near-synonym trap"
      - "opposite tone"
      - "wrong referent"
      - "overgeneralization"
      - "negation trap"

  數學:
    traits: "概念理解、運算步驟、條件限制、單位與定義域。題目清楚已知/所求。"
    misconceptions:
      - "漏條件/定義域"
      - "單位/比例錯"
      - "運算次序/符號錯"
      - "四捨五入/有效數字錯"
      - "概念混淆"
    distractor_hints:
      - "漏條件/定義域"
      - "單位/比例錯"
      - "運算次序/符號錯"
      - "四捨五入/有效數字錯"
      - "概念混淆（面積/周界、平均/中位等）"

  公民與社會發展:
    traits: "概念（法治、身份、全球化、可持續）、資料判讀、立場辨析、政策取捨。"
    misconceptions:
      - "概念混淆"
      - "把立場當事實"
      - "以偏概全"
      - "忽略持份者差異"
      - "忽略政策取捨"
    distractor_hints:
      - "概念混淆（法治/人治、公平/平等、權利/責任）"
      - "把立場當事實"
      - "以偏概全（個案推普遍）"
      - "忽略持份者差異"
      - "忽略政策取捨（只講好/只講壞）"

  科學:
    traits: "概念理解、變量控制、公平測試、數據解讀、由證據推論。"
    misconceptions:
      - "相關≠因果"
      - "未控制變量"
      - "結論超出數據"
      - "精確度/準確度混淆"
      - "樣本不足"
    distractor_hints:
      - "相關≠因果"
      - "未控制變量"
      - "結論超出數據"
      - "精確度/準確度混淆"
      - "樣本/重複不足"

  物理:
    traits: "定律應用、受力分析、能量/動量、圖像解讀、單位與方向。"
    misconceptions:
      - "方向/向量錯"
      - "單位混淆"
      - "忽略摩擦/損耗"
      - "圖像斜率/面積誤讀"
      - "作用力反作用力混淆"
    distractor_hints:
      - "方向/向量（正負號反）"
      - "單位混淆（N/J/W 等）"
      - "忽略摩擦/損耗（理想化錯用）"
      - "圖像斜率/面積誤讀"
      - "作用力反作用力混淆"

  化學:
    traits: "粒子模型、方程式與配平、計量、反應條件、實驗設計與安全。"
    misconceptions:
      - "未配平"
      - "摩爾/質量/體積混淆"
      - "濃度概念錯"
      - "強弱vs濃度"
      - "限量試劑錯"
    distractor_hints:
      - "方程式未配平/係數錯"
      - "摩爾/質量/體積混淆"
      - "濃度概念錯（稀釋/體積變化）"
      - "酸鹼強弱 vs 濃度"
      - "限量試劑判斷錯"

  生物:
    traits: "結構與功能、恆常性、遺傳演化、生態與人類影響、數據解讀。"
    misconceptions:
      - "目的論"
      - "層級混淆"
      - "相關≠因果"
      - "負回饋方向反"
      - "能量流向概念錯"
    distractor_hints:
      - "目的論（把適應當有意圖）"
      - "層級混淆（細胞/器官/系統）"
      - "相關≠因果"
      - "負回饋方向反"
      - "能量流向/生態概念錯"

  地理:
    traits: "成因→過程→影響→管理、空間分佈、案例比較、地圖/數據判讀。"
    misconceptions:
      - "單一原因化"
      - "天氣/氣候混淆"
      - "尺度/地點忽略"
      - "結果當原因"
      - "只講一面"
    distractor_hints:
      - "單一原因化（忽略多因素互動）"
      - "天氣/氣候混淆"
      - "尺度/地點條件忽略"
      - "結果當原因"
      - "只講一面（忽略取捨/持份者）"

  歷史:
    traits: "時序、因果、史料解讀、觀點與偏見、短/長期影響。"
    misconceptions:
      - "時序混淆"
      - "後果當原因"
      - "以今論古"
      - "單一因素決定論"
      - "史料立場忽略"
    distractor_hints:
      - "時序/年代混淆"
      - "後果當原因"
      - "以今論古"
      - "單一因素決定論"
      - "史料立場忽略（把主張當事實）"

  中國歷史:
    traits: "朝代脈絡、制度與社會、延續/變革、史料與論證。"
    misconceptions:
      - "朝代先後混淆"
      - "制度名詞混淆"
      - "結果當原因"
      - "中央/地方混淆"
      - "以偏概全"
    distractor_hints:
      - "朝代先後混淆"
      - "制度名詞混淆"
      - "結果當原因"
      - "中央/地方權力混淆"
      - "以偏概全（以一例概括一代）"

  宗教:
    traits: "宗教概念、倫理抉擇、教義理解、比較觀點與反思。"
    misconceptions:
      - "個人意見當教義"
      - "混淆宗教概念"
      - "只講規條忽略情境"
      - "忽略價值衝突"
    distractor_hints:
      - "把個人意見當教義"
      - "混淆不同宗教概念"
      - "只講規條忽略情境"
      - "忽略價值衝突"
      - "描述當評價"

  資訊及通訊科技（ICT）:
    traits: "系統概念、資料表示、網絡與安全、演算法思維、硬/軟件與應用。"
    misconceptions:
      - "加密vs雜湊"
      - "IPvsMAC"
      - "備份vs同步"
      - "授權vs認證"
      - "安全措施角色混淆"
    distractor_hints:
      - "加密 vs 雜湊"
      - "IP vs MAC"
      - "備份 vs 同步"
      - "授權 vs 認證"
      - "安全措施角色混淆（防火牆/防毒/權限）"

  經濟:
    traits: "供需、彈性、外部性、市場失靈、政策影響與圖像解讀。"
    misconceptions:
      - "需求vs需求量"
      - "曲線移動方向錯"
      - "稅負歸宿誤判"
      - "彈性判斷反"
      - "福利變化誤判"
    distractor_hints:
      - "需求 vs 需求量"
      - "曲線移動方向錯（把價格變動當移動）"
      - "稅負歸宿誤判（只看法定承擔者）"
      - "彈性判斷反"
      - "福利變化誤判（剩餘/死重損失）"

  企業、會計與財務概論:
    traits: "會計原則、報表解讀、成本/定價、比率、現金流。"
    misconceptions:
      - "利潤vs現金流"
      - "收入vs收款"
      - "資產/費用/支出混淆"
      - "比率公式代錯"
      - "折舊/應收應付理解錯"
    distractor_hints:
      - "利潤 vs 現金流"
      - "收入 vs 收款"
      - "資產/費用/支出混淆"
      - "比率公式代錯"
      - "折舊/應收應付理解錯"

  公民、經濟及社會:
    traits: "公民身份、經濟基本概念、社會議題、資料解讀與價值判斷。"
    misconceptions:
      - "道德判斷當事實"
      - "以偏概全"
      - "因果倒置"
      - "忽略多方持份者"
      - "概念字面化"
    distractor_hints:
      - "道德判斷當事實"
      - "以偏概全"
      - "因果倒置"
      - "忽略多方持份者"
      - "概念字面化（忽略情境/證據）"

  旅遊與款待:
    traits: "旅遊系統、服務質素、營運、安全與風險、可持續、客戶體驗。"
    misconceptions:
      - "短期成本忽略口碑"
      - "服務補救不當"
      - "忽略安全風險"
      - "忽略可持續/承載量"
      - "忽略顧客差異"
    distractor_hints:
      - "只顧短期成本忽略口碑/品牌"
      - "服務補救不當（推卸責任/欠同理）"
      - "忽略安全與風險"
      - "忽略可持續/承載量"
      - "忽略顧客需求差異"

# 難度等級的干擾項規則
distractor_rules_by_level:
  easy: "干擾項反映基本誤解；錯在單一步驟；避免過度相似。"
  medium: "干擾項包含部分正確但推論錯或漏條件；至少兩個看似合理。"
  hard: "干擾項為多步推理陷阱：條件誤判、圖像誤讀、單位/方向/定義域錯。"
  mixed: "混合 medium/hard 強度；同一套題可含不同難度但每題仍要清晰。"

# 默認特性（當科目不在配置中時使用）
default_traits: "請按內容出題，語句自然，避免使用『根據教材/根據文本/根據以上』等提示語。"
